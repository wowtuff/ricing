debug:disable_logs = false
animations {
    enabled = false
}
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(cba6f7ff)
    col.inactive_border = rgba(595959aa)
}
decoration {
    rounding = 8
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}
input {
    kb_layout = us
    follow_mouse = 1
}
$mod = SUPER
bind = $mod, Return, exec, foot
bind = $mod, Q, killactive
bind = $mod, F, fullscreen
exec-once = waybar
