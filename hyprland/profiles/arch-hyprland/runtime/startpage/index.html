<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Projects</title>
<style>
  :root {
    --bg: #000;
    --fg: #fff;
    --ring: rgba(255,255,255,.95);
    --line: rgba(255,255,255,.28);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: var(--bg);
    color: var(--fg);
    font-family: "JetBrains Mono", monospace;
    overflow: hidden;
  }
  .ring {
    position: relative;
    width: min(62vw, 560px);
    aspect-ratio: 1;
    border-radius: 50%;
    background:
      radial-gradient(circle at center, #000 0 33%, transparent 33.3%),
      repeating-conic-gradient(from 0deg, var(--ring) 0deg 1.6deg, var(--line) 1.6deg 3.2deg);
    filter: contrast(115%);
  }
  .ring::before {
    content: "";
    position: absolute;
    inset: 22%;
    border-radius: 50%;
    background: #000;
    box-shadow: 0 0 0 1px rgba(255,255,255,.06);
  }
  .content {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    text-align: center;
    z-index: 2;
  }
  .inner {
    transform: translateY(6%);
  }
  .label {
    margin-bottom: 18px;
    font-size: 15px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: rgba(255,255,255,.92);
  }
  .btn {
    display: inline-block;
    padding: 14px 28px;
    border: 1px solid rgba(255,255,255,.9);
    color: #fff;
    text-decoration: none;
    font-weight: 700;
    letter-spacing: .12em;
  }
</style>
</head>
<body>
  <div class="ring">
    <div class="content">
      <div class="inner">
        <div class="label">all of my projects live here</div>
        <a class="btn" href="#">INDEX</a>
      </div>
    </div>
  </div>
</body>
</html>
